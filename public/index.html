<!doctype html>
<html lang="en">
<head>
    <!-- Basic Page Needs
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
    <meta charset="utf-8" />
    <title>饼饼! </title>
    <meta name="description" content="基于Durable Objects的智能聊天应用" />
    <meta name="author" content="" />

    <!-- Mobile Specific Metas
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes" />

    <!-- CSS
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/skeleton.css" />
    <link rel="stylesheet" href="styles.css" />
    
    <!-- 添加Google Fonts和Font Awesome图标库 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Favicon
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
    <link rel="icon" type="image/ico" href="favicon.ico" />
    <script src="/dist/index.js" type="module"></script>
    
    <!-- 内联样式美化 - 完全不影响原有功能 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #2d3748;
            overflow-x: hidden;
        }

        /* 容器美化 - 移动端优化 */
        .container.custom-container {
            width: 100%;
            min-height: 100vh;
            height: auto;
            max-width: 1400px;
            margin: 0 auto;
            padding: 12px;
            display: flex;
            align-items: center;
        }

        /* 行美化 - 移动端自适应 */
        .row.custom-row {
            width: 100%;
            min-height: 600px;
            height: auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
            transition: transform 0.3s ease;
        }

        .row.custom-row:hover {
            transform: scale(1.01);
        }

        /* 左侧区域美化 - 移动端优先 */
        .left-panel {
            background: linear-gradient(145deg, #f7fafc 0%, #edf2f7 100%);
            padding: 30px 20px !important;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-right: 1px solid rgba(0, 0, 0, 0.05);
            margin-top: 0 !important;
            min-height: 280px;
        }

        /* 装饰性背景元素 */
        .left-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 修改后的标题样式 */
        .left-panel h4 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            position: relative;
            z-index: 1;
            line-height: 1.3;
        }

        .left-panel h4 .wuhan {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
        }

        .left-panel h4 .bingbing {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            margin-left: 5px;
        }

        /* 添加欢迎表情 */
        .welcome-emoji {
            font-size: 2rem;
            margin-right: 10px;
            vertical-align: middle;
        }

        .left-panel p {
            font-size: 1.1rem;
            line-height: 1.5;
            color: #4a5568;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .left-panel p i {
            color: #667eea;
            font-size: 1.2rem;
        }

        /* 位置标识美化 */
        .location-badge {
            display: inline-flex;
            align-items: center;
            background: white;
            padding: 6px 14px;
            border-radius: 50px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-top: 10px;
            font-size: 0.9rem;
            color: #4a5568;
            border: 1px solid rgba(102, 126, 234, 0.2);
            width: fit-content;
        }

        .location-badge i {
            color: #48bb78;
            margin-right: 6px;
            font-size: 0.9rem;
        }

        .location-badge span {
            font-weight: 500;
        }

        .location-badge .city {
            color: #667eea;
            font-weight: 600;
            margin-left: 4px;
        }

        /* 功能卡片 - 移动端调整 */
        .feature-list {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #4a5568;
            font-size: 0.9rem;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 10px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .feature-item i {
            color: #667eea;
            width: 20px;
            font-size: 1rem;
        }

        /* 右侧区域美化 */
        .right-panel {
            background: white;
            padding: 0 !important;
            min-height: 500px;
            height: auto;
            position: relative;
        }

        /* 右侧内容包装器 */
        .chat-wrapper {
            height: 100%;
            width: 100%;
            background: white;
            border-radius: 0 28px 28px 0;
            overflow: hidden;
        }

        /* 确保root元素占满整个右侧 */
        #root {
            height: 100%;
            min-height: 500px;
            width: 100%;
            display: block;
        }

        /* 移动端响应式 - 彻底修复显示问题 */
        @media (max-width: 750px) {
            body {
                padding: 0;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }

            .container.custom-container {
                padding: 8px;
                min-height: 100vh;
                height: auto;
                align-items: flex-start;
            }
            
            .row.custom-row {
                flex-direction: column;
                height: auto;
                min-height: auto;
                border-radius: 24px;
            }
            
            .left-panel {
                width: 100% !important;
                border-right: none;
                border-bottom: 1px solid rgba(0, 0, 0, 0.05);
                border-radius: 24px 24px 0 0;
                padding: 24px 20px !important;
                min-height: auto;
                flex: 0 0 auto;
            }
            
            .right-panel {
                width: 100% !important;
                border-radius: 0 0 24px 24px;
                min-height: 70vh;
                height: auto;
                flex: 1 1 auto;
            }

            .chat-wrapper {
                border-radius: 0 0 24px 24px;
                height: 100%;
            }

            #root {
                min-height: 60vh;
                height: auto;
            }
            
            /* 移动端标题调整 */
            .left-panel h4 {
                font-size: 1.8rem;
            }

            .left-panel p {
                font-size: 1rem;
            }
            
            /* 移动端功能列表显示调整 */
            .feature-list {
                display: flex;
                gap: 8px;
            }

            .feature-item {
                font-size: 0.85rem;
                padding: 6px 10px;
            }

            .welcome-emoji {
                font-size: 1.8rem;
            }
        }

        /* 小屏幕手机优化 */
        @media (max-width: 480px) {
            .container.custom-container {
                padding: 6px;
            }

            .left-panel {
                padding: 20px 15px !important;
            }

            .left-panel h4 {
                font-size: 1.6rem;
            }

            .left-panel p {
                font-size: 0.95rem;
            }

            .feature-item {
                font-size: 0.8rem;
                padding: 5px 8px;
            }

            .feature-item i {
                font-size: 0.9rem;
                width: 18px;
            }

            .location-badge {
                padding: 4px 12px;
                font-size: 0.85rem;
            }

            #root {
                min-height: 55vh;
            }

            .welcome-emoji {
                font-size: 1.6rem;
            }
        }

        /* 横屏模式优化 */
        @media (max-height: 600px) and (orientation: landscape) {
            .row.custom-row {
                flex-direction: row;
                min-height: 85vh;
            }

            .left-panel {
                width: 30% !important;
                border-right: 1px solid rgba(0, 0, 0, 0.05);
                border-bottom: none;
                border-radius: 24px 0 0 24px;
            }

            .right-panel {
                width: 70% !important;
                border-radius: 0 24px 24px 0;
            }

            .feature-list {
                display: none; /* 横屏隐藏功能列表 */
            }
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
        }

        /* 加载动画 */
        .loading-animation {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            min-height: 300px;
            background: white;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Primary Page Layout
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
    <div class="container custom-container">
        <div class="row custom-row">
            <!-- 左侧区域 - 修改了标题文字 -->
            <div class="one-third column left-panel" style="margin-top: 0 !important">
                <!-- 修改为：武汉饼饼欢迎你 -->
                <h4>
                    <span class="welcome-emoji">🍪🍪</span>
                    <span class="wuhan">武汉</span>
                    <span class="bingbing">饼饼</span>
                    <br>欢迎你
                </h4>
                
                <p>
                    <i class="fas fa-map-marker-alt"></i>
                    我在武昌
                </p>

                <div class="location-badge">
                    <i class="fas fa-circle"></i>
                    <span>当前定位: <span class="city">武汉市</span></span>
                </div>

                <div class="feature-list">
                    <div class="feature-item">
                        <i class="fas fa-bolt"></i>
                        <span>徐家棚</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-shield-alt"></i>
                        <span>6朵 45分钟</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-history"></i>
                        <span>一条🐉福务</span>
                    </div>
                </div>
            </div>
            
            <!-- 右侧区域保持不变 -->
            <div class="two-thirds column right-panel">
                <div class="chat-wrapper">
                    <div id="root">
                        <div class="loading-animation" id="loading-animation">
                            <div class="loading-spinner"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            window.addEventListener('load', function() {
                const loadingEl = document.getElementById('loading-animation');
                if (loadingEl) {
                    setTimeout(function() {
                        loadingEl.style.display = 'none';
                    }, 500);
                }
            });

            // 监听横竖屏变化
            window.addEventListener('resize', function() {
                // 可以在这里添加横竖屏切换时的处理逻辑
                // 但保持功能不变
            });
        })();
    </script>
</body>
</html>
